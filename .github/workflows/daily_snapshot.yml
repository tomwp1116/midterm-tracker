name: Daily Snapshot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python setup_db.py
      - run: python real_inventory.py
      - run: python scripts/daily_snapshot.py
      - name: Copy JSON to docs/ for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/dashboard_data.json docs/data/dashboard_data.json
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/midterms.db docs/data/dashboard_data.json
          git diff --staged --quiet || git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
          git push